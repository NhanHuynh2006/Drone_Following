# PFDet-Nano v15 Training Configuration
# Model improvements over v14:
#   - CSPUIBStage at P3/P4/P5 (better gradient flow)
#   - LSKBlock in backbone at P2 output (early aerial attention)
#   - AreaAttention at P4 + P5 (was only P5)
#   - Default: balanced profile (base_c=32, neck_c=64, num_bifpn=2, ~2.0M params)
# Loss improvements:
#   - STAL: size-aware TAL boost (γ=2.0) for tiny objects
# Train at 640px, same schedule as v9

meta:
  role: paper_train
  notes: "v15: CSP backbone + STAL loss. Compare with v14/v9."

model:
  version: v15
  profile: balanced          # base_c=32, neck_c=64, num_bifpn=2
  activation: silu
  use_area_attention: true
  area: 3
  img_size: 640

data:
  root: "./data/visdrone"
  cache_ram: false
  train_images: "train/images"
  train_labels: "train/labels"
  val_images: "val/images"
  val_labels: "val/labels"

  extra_images: "../coco_person/images"
  extra_labels: "../coco_person/labels"
  extra_sample_ratio: 0.20
  extra_enable_epoch: 150
  extra_disable_epoch: 280

  mosaic_prob: 0.50
  mixup_prob: 0.10
  hflip_prob: 0.5
  affine_prob: 1.0
  color_jitter_prob: 1.0
  drone_aug_prob: 0.30
  copy_paste_prob: 0.40

train:
  device: "cuda:0"
  benchmark_profile: desktop_4060
  channels_last: true
  epochs: 400
  batch_size: 10             # larger model → less batch, grad_accum compensates
  grad_accumulate: 5         # effective batch = 50
  num_workers: 14
  optimizer:
    name: adamw
    fused: auto
    lr: 0.003
    lr_min: 0.00003
    weight_decay: 0.0005
    momentum: 0.937
  warmup_epochs: 10
  amp: true
  ema_decay: 0.9998
  seed: 42
  val_interval: 5
  val_vis_conf: 0.25
  mosaic_off_last: 60
  val_use_ema: true
  save_dir: "./runs/train_v15"
  multiscale:
    enabled: true
    range: [0.5, 1.0]        # 320px–640px (covers Pi deployment)
    step: 32
    freq: 10

loss:
  obj_weight: 8.0
  box_weight: 4.0
  qfl_beta: 2.0
  hard_floor: 0.0
  obj_warmup_epochs: 10
  prog_epochs: 400
  k_tiny: 6
  k_normal: 3
  search_r_tiny: 3
  search_r_normal: 2
  tiny_area_px: 576.0
  scale_match_alpha: 0.5
  scale_match_base: 2.0
  asl_area_ref: 0.004
  asl_max: 4.0
  tal_alpha: 1.0
  tal_beta: 8.0
  nwd_area_thr: 1024.0
  nwd_c: 0.019               # 12/640
  ohem_ratio: 8.0
  # STAL (v15 only)
  stal_gamma: 2.0            # alignment *= (1 + 2.0 * exp(-area/area_ref))
  stal_area_ref: 576.0       # 24×24px at 640px input

eval:
  conf_thr: 0.01
  iou_thr: 0.5
  max_det: 300
  min_box_area: 16.0
  min_aspect: 0.0
  max_aspect: 8.0
  focus_min_gt_area: 64.0
  focus_primary: true

export:
  output_names: [output_p2, output_p3, output_p4, output_p5]
