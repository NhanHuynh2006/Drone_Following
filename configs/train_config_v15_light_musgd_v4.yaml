# PFDet-Nano v15 Light — MuSGD v4 (finetune from v3 best)
# Strategy: cosine restart from best checkpoint + stronger augmentation + SWA
# Goal: squeeze extra AP beyond v3's 0.5932 peak

meta:
  role: edge_candidate
  notes: "v15 light MuSGD finetune: cosine restart + strong aug + SWA"

model:
  version: v15
  profile: light
  activation: silu
  use_area_attention: true
  area: 3
  img_size: 640

data:
  root: "./data/visdrone"
  cache_ram: false
  train_images: "train/images"
  train_labels: "train/labels"
  val_images: "val/images"
  val_labels: "val/labels"

  extra_images: "../coco_person/images"
  extra_labels: "../coco_person/labels"
  extra_sample_ratio: 0.25        # slightly more COCO
  extra_enable_epoch: 0            # COCO from start (model already learned VisDrone)
  extra_disable_epoch: 80          # disable last 20ep for VisDrone-only fine-grain

  # Stronger augmentation for regularization
  mosaic_prob: 0.60                # 0.50 -> 0.60
  mixup_prob: 0.20                 # 0.10 -> 0.20
  hflip_prob: 0.5
  affine_prob: 1.0
  color_jitter_prob: 1.0
  drone_aug_prob: 0.35             # 0.30 -> 0.35
  copy_paste_prob: 0.55            # 0.40 -> 0.55 (more tiny person instances)

train:
  device: "cuda:0"
  benchmark_profile: desktop_4060
  channels_last: true
  epochs: 100                      # short finetune, not full 400
  batch_size: 12
  grad_accumulate: 8               # effective batch = 96
  num_workers: 14
  optimizer:
    name: musgd
    lr: 0.003                      # lower than v3's 0.01 (finetune, not from scratch)
    lr_min: 0.00005
    weight_decay: 0.0005
    momentum: 0.9
  warmup_epochs: 3                 # short warmup (already pretrained)
  amp: true
  ema_decay: 0.9998
  seed: 42
  val_interval: 5
  val_vis_conf: 0.5
  mosaic_off_last: 20              # disable mosaic last 20ep for clean finetune
  val_use_ema: true
  save_dir: "./runs/train_v15_light_musgd_v4"
  pretrained: "./runs/train_v15_light_musgd_v3/best.pt"
  swa:
    enabled: true
    start_epoch: 60                # start averaging from epoch 60/100
    lr: 0.0005                     # fixed low LR during SWA phase
  multiscale:
    enabled: true
    range: [0.5, 1.0]
    step: 32
    freq: 10

loss:
  obj_weight: 8.0
  box_weight: 4.0
  qfl_beta: 2.0
  hard_floor: 0.0
  obj_warmup_epochs: 3
  prog_epochs: 1200
  k_tiny: 6
  k_normal: 3
  search_r_tiny: 3
  search_r_normal: 2
  tiny_area_px: 576.0
  asl_area_ref: 0.004
  asl_max: 4.0
  tal_alpha: 1.0
  tal_beta: 8.0
  nwd_area_thr: 1024.0
  nwd_c: 0.019
  stal_gamma: 2.0
  stal_area_ref: 576.0
  stal_min_area_px: 64.0
  stal_k_min: 4
  prog_loss_factor: 1.5            # milder than 2.0 (model already knows obj vs box balance)

eval:
  conf_thr: 0.01
  iou_thr: 0.5
  max_det: 300
  min_box_area: 16.0
  min_aspect: 0.0
  max_aspect: 8.0
  focus_min_gt_area: 64.0
  focus_primary: true

export:
  output_names: [output_p2, output_p3, output_p4, output_p5]
