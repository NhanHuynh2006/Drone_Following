# PFDet-Nano v5 Training Configuration

model:
  base_c: 32
  img_size: 416

data:
  root: "./data/visdrone"
  train_images: "train/images"
  train_labels: "train/labels"
  val_images: "val/images"
  val_labels: "val/labels"
  mosaic_prob: 0.6
  mixup_prob: 0.15

train:
  device: "cuda:0"
  epochs: 200
  batch_size: 64
  num_workers: 12
  lr: 0.003
  lr_min: 0.00001
  weight_decay: 0.0005
  warmup_epochs: 10
  amp: true
  save_dir: "./runs/train_v5"
  val_interval: 5
  mosaic_off_last: 20
  ema_decay: 0.9998

loss:
  obj_weight: 0.5
  box_weight: 5.0
