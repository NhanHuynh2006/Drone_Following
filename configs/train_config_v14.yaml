# PFDet-Nano v14 Training Configuration
# Architecture: UIB backbone + AreaAttention + BiFPN + DecoupledHead
# Strides: [4, 8, 16, 32] — 4-scale detection including P2 ultra-fine

meta:
  role: research_enhanced
  notes: "Enhanced PFDet research config with strong loss/data tricks. Use only after PFDet-clean is benchmarked."

model:
  version: v14
  profile: balanced
  activation: silu
  use_area_attention: true
  base_c: 32        # Channel base width → ~1.7M params
  neck_c: 64        # BiFPN / head channel width
  num_bifpn: 2      # BiFPN iterations
  area: 3           # AreaAttention patch size (3×3 = 9 tokens per area)
  img_size: 384     # Input resolution

data:
  root: "./data/visdrone"
  cache_ram: false
  train_images: "train/images"
  train_labels: "train/labels"
  val_images: "val/images"
  val_labels: "val/labels"

  # COCO-person domain mixing (helps early generalization)
  extra_images: "./data/coco_person/images"
  extra_labels: "./data/coco_person/labels"
  extra_sample_ratio: 0.35   # 35% COCO per epoch during mixing phase
  extra_enable_epoch: 15     # Start mixing at epoch 15
  extra_disable_epoch: 100   # Switch back to drone-only at epoch 100

  # Augmentation
  mosaic_prob: 0.30
  mixup_prob: 0.0
  hflip_prob: 0.5
  affine_prob: 1.0
  color_jitter_prob: 1.0
  drone_aug_prob: 0.20       # DroneAug: simulate altitude changes
  copy_paste_prob: 0.25      # Copy-paste tiny persons — proven +3-5 AP on VisDrone

train:
  device: "cuda:0"
  benchmark_profile: desktop_4060
  channels_last: true
  epochs: 250
  batch_size: 16          # safer default for 8GB-class GPUs
  num_workers: 12
  optimizer:
    name: adamw
    fused: auto
    lr: 0.003
    lr_min: 0.00003
    weight_decay: 0.0005
    momentum: 0.937
  warmup_epochs: 10
  amp: true
  ema_decay: 0.9998
  seed: 42
  val_interval: 5
  val_vis_conf: 0.25
  mosaic_off_last: 40        # Disable mosaic last 40 epochs for clean fine-tuning
  val_use_ema: true
  save_dir: "./runs/train_v14_v2"
  multiscale:
    enabled: true
    range: [0.75, 1.25]    # 288px–480px (base 384px)
    step: 32               # must be divisible by max stride (32)
    freq: 10               # change resolution every 10 batches

loss:
  # Loss weights — tuned for 4-scale with P2 (more positives per image)
  obj_weight: 8.0            # Higher obj weight — box gradient >> obj was causing imbalance
  box_weight: 4.0

  # QFL schedule
  qfl_beta: 2.0
  hard_floor: 0.0            # CRITICAL: 0.25 inflates targets for bad preds → precision≈0. Pure IoU soft target.
  obj_warmup_epochs: 30      # Ramp up IoU soft targets over 30 epochs

  # Progressive assignment schedule
  prog_epochs: 250           # Match total epochs — sudden k drop at epoch 61 caused instability with 80
  k_tiny: 6                  # Max positives for tiny objects (STAL guarantee)
  k_normal: 3                # Max positives for normal objects
  search_r_tiny: 3           # Search radius (cells) for tiny objects
  search_r_normal: 2         # Search radius (cells) for normal objects — 9→25 candidates
  tiny_area_px: 576.0        # Area threshold for "tiny" label (≈24×24px, aligns with VisDrone "small")
  scale_match_alpha: 0.5     # Mild scale prior: steer GTs toward the most suitable FPN level
  scale_match_base: 2.0      # Preferred object side ~= stride * 2 (P2 target=8px — 5-12px persons prefer P2)

  # ASL: altitude-scaled weighting for tiny targets
  asl_area_ref: 0.004        # Reference area (normalized): ≈ 24×24px at 384px — boost sub-24px objects
  asl_max: 4.0               # Max ASL multiplier (4× boost for sub-10px objects)

  # TAL: Task-Aligned Label Assignment (replaces distance-based AAPA)
  tal_alpha: 1.0             # score exponent in alignment = score^α × IoU^β
  tal_beta: 4.0              # IoU exponent — reduced from 6.0 for stable assignment under multi-scale aug
  # NWD: Normalized Wasserstein Distance for tiny objects
  nwd_area_thr: 1024.0       # Use NWD for objects < 32×32px (more stable than CIoU for tiny)
  nwd_c: 0.04                # calibrated for ~384px normalized coords
  # OHEM: Online Hard Example Mining
  ohem_ratio: 8.0            # keep 8×n_pos hardest negatives (~10% of all cells)

eval:
  conf_thr: 0.01
  iou_thr: 0.5
  max_det: 300
  min_box_area: 16.0         # Filter detections smaller than 16px²
  min_aspect: 0.0
  max_aspect: 8.0            # Aerial humans can be very tall/thin

  # Focus metric: small target performance (primary metric for model selection)
  focus_min_gt_area: 64.0    # Track AP on GT area >= 64px² (8×8px)
  focus_primary: true

export:
  output_names: [output_p2, output_p3, output_p4, output_p5]
