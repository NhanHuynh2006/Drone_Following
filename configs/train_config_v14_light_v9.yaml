# PFDet-Nano v14 Light — v9: Maximum AP configuration
# Train at 640px, multiscale covers 320px for Pi deployment
# All augmentations maxed out, 400 epochs

meta:
  role: paper_train
  notes: "v9: 640px + full augmentation + 400 epochs. Best AP target."

model:
  version: v14
  profile: light
  activation: silu
  use_area_attention: true
  base_c: 24
  neck_c: 48
  num_bifpn: 1
  area: 3
  img_size: 640

data:
  root: "./data/visdrone"
  cache_ram: false
  train_images: "train/images"
  train_labels: "train/labels"
  val_images: "val/images"
  val_labels: "val/labels"

  extra_images: "../coco_person/images"
  extra_labels: "../coco_person/labels"
  extra_sample_ratio: 0.20
  extra_enable_epoch: 150
  extra_disable_epoch: 280

  mosaic_prob: 0.50           # was 0.30
  mixup_prob: 0.10            # was 0.00 — helps generalization
  hflip_prob: 0.5
  affine_prob: 1.0
  color_jitter_prob: 1.0
  drone_aug_prob: 0.30        # was 0.20
  copy_paste_prob: 0.40       # was 0.25 — very effective for tiny VisDrone persons

train:
  device: "cuda:0"
  benchmark_profile: desktop_4060
  channels_last: true
  epochs: 400
  batch_size: 12
  grad_accumulate: 4          # effective batch = 48
  num_workers: 14
  optimizer:
    name: adamw
    fused: auto
    lr: 0.003
    lr_min: 0.00003
    weight_decay: 0.0005
    momentum: 0.937
  warmup_epochs: 10
  amp: true
  ema_decay: 0.9998
  seed: 42
  val_interval: 5
  val_vis_conf: 0.25
  mosaic_off_last: 60         # mosaic off at epoch 340, 60 epochs fine-tuning
  val_use_ema: true
  save_dir: "./runs/train_v14_light_v9"
  multiscale:
    enabled: true
    range: [0.5, 1.0]         # 320px–640px — covers Pi deployment resolution
    step: 32
    freq: 10

loss:
  obj_weight: 8.0
  box_weight: 4.0
  qfl_beta: 2.0
  hard_floor: 0.0
  obj_warmup_epochs: 10
  prog_epochs: 400
  k_tiny: 6
  k_normal: 3
  search_r_tiny: 3
  search_r_normal: 2
  tiny_area_px: 576.0
  scale_match_alpha: 0.5
  scale_match_base: 2.0
  asl_area_ref: 0.004
  asl_max: 4.0
  tal_alpha: 1.0
  tal_beta: 8.0               # was 6.0 — stricter positive selection
  nwd_area_thr: 1024.0
  nwd_c: 0.019                # 12/640
  ohem_ratio: 8.0

eval:
  conf_thr: 0.01
  iou_thr: 0.5
  max_det: 300
  min_box_area: 16.0
  min_aspect: 0.0
  max_aspect: 8.0
  focus_min_gt_area: 64.0
  focus_primary: true

export:
  output_names: [output_p2, output_p3, output_p4, output_p5]
